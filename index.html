<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.K Kollection</title>

    <link rel="stylesheet" href="css/styles.css">

</head>
<body>

    <!-- Full-page hero section with logo -->
    <section class="hero" id="hero">

        <div class="logo-container">
             <img class="logo-overlay" src="assets/images/logo/logo.png" alt="O.K Kollection Logo">
        </div>

        <h2>Affordable fashion for everyone</h2>
        <button class="shop-btn" onclick="showMenu()">Shop Now</button>

    </section>

    <!-- Shop Menu Section -->
    <section class="shop-menu" id="shopMenu" style="display:none;">

        <button class="back-btn" onclick="backToHome()">← Back</button>
        <input class="search-input" type="text" placeholder="search product...">
        <div class="menu-container">
            <h2>Select a category</h2>

            <div class="category-grid">
                <button class="category-card" onclick="showCategory('mens')" aria-label="Men's Fashion">
                    <span class="category-card-icon" aria-hidden="true">👔</span>
                    <span class="category-card-title">Men's Fashion</span>
                    <span class="category-card-subtitle">Stylish &amp; modern garb</span>
                </button>

                <button class="category-card" onclick="showCategory('womens')" aria-label="Women's Fashion">
                    <span class="category-card-icon" aria-hidden="true">👗</span>
                    <span class="category-card-title">Women's Fashion</span>
                    <span class="category-card-subtitle">Elegant everyday essentials</span>
                </button>

                <button class="category-card" onclick="showCategory('kids')" aria-label="Kids' Fashion">
                    <span class="category-card-icon" aria-hidden="true">👕</span>
                    <span class="category-card-title">Kids' Fashion</span>
                    <span class="category-card-subtitle">Playful looks for little ones</span>
                </button>
            </div>

        </div>

    </section>

    <!-- Products Section -->
    <section class="products-section" id="productsSection" style="display:none;">
        <button class="back-btn" onclick="backToMenu()">← Back</button>
        <h2 id="categoryTitle"></h2>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>


        

    </section>

    <!-- Bottom Navigation (mobile-style) -->
    <nav class="bottom-nav" aria-label="Site navigation">
      <a href="index.html" title="Home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="public files/product.html" title="Categories">
        <span class="nav-icon">🛍️</span>
        <span class="nav-label">Categories</span>
      </a>
      <a href="public files/checkout.html" title="Cart">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Cart</span>
      </a>
      <a href="public files/wishlist.html" title="Wishlist">
        <span class="nav-icon">❤️</span>
        <span class="nav-label">Wishlist</span>
      </a>
      <a href="public files/account.html" title="Account">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Account</span>
      </a>
    </nav>

 <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 O.K Kollection Clothing. All rights reserved.</p>
    </footer>


    <script src="js/main.js"></script>
    <script src="js/wishlist.js"></script>

</body>
</html>
