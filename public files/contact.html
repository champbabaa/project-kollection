<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us | O.K Kollection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/main.js" defer></script>
</head>
<body>

<header class="header">
<h1>O.K Kollection</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

    
    <section class="contact">
        <h2>Contact Us</h2>

        <p>Email: okkollection@gmail.com</p>
        <p>Phone: +254 728442730</p>
        <p>Lillian Adhiambo</p>

        <h3>Send us a Message</h3>
        <form id="contact-form" onsubmit="handleContactForm(event)">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>

          <label for="subject">Subject:</label>
          <input type="text" id="subject" name="subject" required>

          <label for="message">Message:</label>
          <textarea id="message" name="message" rows="5" required></textarea>

          <button type="submit">Send Message</button>
        </form>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 O.K Kollection Clothing. All rights reserved.</p>
  </footer>

  <!-- JS -->
  <script src="js/contact.js"></script>
  <script>
    function handleContactForm(event) {
      event.preventDefault();
      const form = document.getElementById("contact-form");
      
      if (validateForm(form)) {
        showNotification("Message sent successfully!");
        form.reset();
      } else {
        showNotification("Please fill in all required fields", 3000);
      }
    }
  </script>
</body>
</html>
