<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | O.K Kollection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="checkout-page">

  <header class="header">
    <h1>O.K Kollection</h1>
    <nav>
      <a href="../index.html">Home</a>
      <a href="product.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="checkout">
      <h2>Checkout</h2>

      <!-- Order Summary -->
      <div class="order-summary">
        <h3>Order Summary</h3>
        <div id="cart-items">
          <p>No items in cart</p>
        </div>
        <h4>Total: <span id="cart-total">KES 0</span></h4>
      </div>

      <!-- Checkout Form -->
      <form id="checkout-form" onsubmit="handleCheckout(event)">
        
        <fieldset>
          <legend>Personal Information</legend>
          
          <label for="first-name">First Name:</label>
          <input type="text" id="first-name" name="firstName" required>

          <label for="last-name">Last Name:</label>
          <input type="text" id="last-name" name="lastName" required>

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>

          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone" required>
        </fieldset>

        <fieldset>
          <legend>Shipping Address</legend>
          
          <label for="address">Street Address:</label>
          <input type="text" id="address" name="address" required>

          <label for="city">City:</label>
          <input type="text" id="city" name="city" required>

          <label for="postal-code">Postal Code:</label>
          <input type="text" id="postal-code" name="postalCode" required>

          <label for="country">Country:</label>
          <input type="text" id="country" name="country" required>
        </fieldset>

        <fieldset>
          <legend>Payment Method</legend>

          <label>
            <input type="radio" name="paymentMethod" value="mpesa" checked>
            Pay with M-Pesa
          </label>

          <label>
            <input type="radio" name="paymentMethod" value="card">
            Pay with Card
          </label>

          <label>
            <input type="radio" name="paymentMethod" value="cash">
            Cash on Delivery
          </label>
        </fieldset>

        <fieldset id="card-info" style="display: none;">
          <legend>Card Information</legend>

          <label for="card-name">Card Holder Name:</label>
          <input type="text" id="card-name" name="cardName">

          <label for="card-number">Card Number:</label>
          <input type="text" id="card-number" name="cardNumber" placeholder="1234 5678 9012 3456">

          <label for="expiry">Expiry Date:</label>
          <input type="text" id="expiry" name="expiry" placeholder="MM/YY">

          <label for="cvv">CVV:</label>
          <input type="text" id="cvv" name="cvv" placeholder="123">
        </fieldset>

        <fieldset>
          <legend>Delivery Details</legend>

          <label for="delivery-place">Delivery Location:</label>
          <select id="delivery-place" name="deliveryPlace" required>
            <option value="">Choose delivery option</option>
            <option value="home">Home Delivery</option>
            <option value="office">Office Delivery</option>
            <option value="pickup">Store Pickup</option>
          </select>

          <label for="delivery-notes">Delivery Notes (optional):</label>
          <textarea id="delivery-notes" name="deliveryNotes" rows="3" placeholder="e.g. Leave at the gate"></textarea>
        </fieldset>

        <fieldset>
          <legend>Additional Information</legend>
          
          <label for="notes">Special Instructions (Optional):</label>
          <textarea id="notes" name="notes" rows="4"></textarea>

          <label>
            <input type="checkbox" name="agree" required>
            I agree to the Terms and Conditions
          </label>
        </fieldset>

        <button type="submit" class="checkout-btn">Complete Order</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 O.K Kollection Clothing. All rights reserved.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    // Display cart items
    function displayCartItems() {
      const cartContainer = document.getElementById("cart-items");
      const cartItems = getCart ? getCart() : [];
      
      if (cartItems.length === 0) {
        cartContainer.innerHTML = "<p>No items in cart</p>";
        return;
      }

      cartContainer.innerHTML = cartItems.map(item => 
        `<p>${item.name} x${item.quantity} - KES ${item.price * item.quantity}</p>`
      ).join("");
      
      const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById("cart-total").textContent = `KES ${total}`;
    }

    // Handle checkout form submission
    function handleCheckout(event) {
      event.preventDefault();
      const form = document.getElementById("checkout-form");
      
      // Validate form
      if (validateForm(form)) {
        showNotification("Order placed successfully!");
        // Clear cart after successful checkout
        if (typeof clearCart === "function") clearCart();
        form.reset();
      } else {
        showNotification("Please fill in all required fields", 3000);
      }
    }

    // Toggle card payment fields based on chosen payment method
    function togglePaymentFields() {
      const selected = document.querySelector('input[name="paymentMethod"]:checked').value;
      const cardInfo = document.getElementById('card-info');

      if (selected === 'card') {
        cardInfo.style.display = 'block';
      } else {
        cardInfo.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      displayCartItems();
      const paymentRadios = document.querySelectorAll('input[name="paymentMethod"]');
      paymentRadios.forEach(radio => radio.addEventListener('change', togglePaymentFields));
      togglePaymentFields();
    });

    // Display cart on page load
    document.addEventListener("DOMContentLoaded", displayCartItems);
  </script>
</body>
</html>
